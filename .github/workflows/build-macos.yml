name: macOS

on:
  push:
    branches:
      - master
      - ci/*
      - feature/frontend-modern-filters
  pull_request:
    branches:
      - master

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]

    name: ${{ matrix.arch }}
    runs-on: macos-26

    env:
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_cache,readwrite

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install dependencies for package building
        run: |
          brew install autoconf automake autoconf-archive libtool python-setuptools
      - name: Set up CMake
        uses: lukka/get-cmake@latest
      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ matrix.arch }}-osx-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.arch }}-osx-
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json
      - name: Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: release-mac-${{ matrix.arch }}
          buildPreset: release-mac-${{ matrix.arch }}
          configurePresetAdditionalArgs: "['-DMELONDS_EMBED_BUILD_INFO=ON']"
      - name: Compress app bundle
        shell: bash
        run: |
          cd build/release-mac-${{ matrix.arch }}
          mkdir -p melonDS.app/Contents/MacOS/res
          cp -r ../../res/slang-shaders melonDS.app/Contents/MacOS/res/
          zip -r -y ../../macOS-${{ matrix.arch }}.zip melonDS.app
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-${{ matrix.arch }}
          path: macOS-${{ matrix.arch }}.zip
          retention-days: 1
          archive: false
      - name: Save vcpkg cache
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ matrix.arch }}-osx-${{ hashFiles('vcpkg.json') }}

  universal-binary:
    name: Universal binary
    needs: [build-macos]
    runs-on: macos-26
    continue-on-error: true
    steps:
      - name: Download x86_64
        uses: actions/download-artifact@v8
        with:
          name: macOS-x86_64.zip
          path: x86_64
          skip-decompress: true
      - name: Download arm64
        uses: actions/download-artifact@v8
        with:
          name: macOS-arm64.zip
          path: arm64
          skip-decompress: true
      - name: Combine app bundles
        shell: bash
        run: |
          unzip x86_64/*.zip -d x86_64
          unzip arm64/*.zip -d arm64
          lipo {x86_64,arm64}/melonDS.app/Contents/MacOS/melonDS -create -output melonDS
          cp -a arm64/melonDS.app melonDS.app
          cp melonDS melonDS.app/Contents/MacOS/melonDS
          codesign -s - --deep melonDS.app
          zip -r -y macOS-universal.zip melonDS.app
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-universal
          path: macOS-universal.zip
          archive: false
      #     - name: Clean up architecture-specific artifacts
      #       uses: geekyeggo/delete-artifact@v4
      #       with:
      #         failOnError: false
      #         name: |
      #           macOS-x86_64
      #           macOS-arm64
      - name: Continuous Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/feature/frontend-modern-filters'
        with:
          tag_name: continuous
          name: Latest Development Release
          files: macOS-universal.zip
